PART
{
// --- general parameters ---
name = rn_atlasii_iabs
module = Part
author = Raidernick

MODEL
	{
	  model = RN_US_Rockets/AtlasII/atlasii_iabs
          scale = 0.80, 0.80, 0.80
	}
// --- asset parameters ---
//mesh = atlasii_iabs.mu
scale = 0.80
rescaleFactor = 1
// --- node definitions ---
// definition format is Position X, Position Y, Position Z, Up X, Up Y, Up Z

node_stack_top = 0.0, 0.340001, 0.0, 0.0, 1.0, 0.0, 1
node_stack_bottom = 0.0, -0.437519, 0.0, 0.0, -1.0, 0.0, 1

node_stack_engine1 = 0.1, -0.234497, 0.0, 0.0, -1.0, 0.0, 0
node_stack_engine2 = -0.1, -0.234497, 0.0, 0.0, -1.0, 0.0, 0

// --- editor parameters ---
TechRequired = generalRocketry
entryCost = 500
cost = 10500
category = Pods
subcategory = 0
title = Atlas II Integrated Apogee Boost Stage
manufacturer = RN Industries
description = IABS GTO boost stage for Atlas II rocket. Place between the centaur and payload.
attachRules = 1,0,1,1,0
tags = atlas ii iia iias centaur centaurd2 d2 iabs integrated apogee boost

// --- standard part parameters ---
mass = 0.2
dragModelType = default
maximum_drag = 0.2
minimum_drag = 0.3
angularDrag = 2
crashTolerance = 15
maxTemp = 2000
breakingForce = 2000
breakingTorque = 2000
emissiveConstant = 0.8
CrewCapacity = 0
vesselType = Probe
stagingIcon = DECOUPLER_VERT
fuelCrossFeed = True

MODULE
{
	name = ModuleCommand
	minimumCrew = 0
	RESOURCE
	{
		name = ElectricCharge
		rate = 0.005
	}
	hasHibernation = True
}
MODULE
{
	name = ModuleReactionWheel
	
	PitchTorque = 1
	YawTorque = 1
	RollTorque = 1
	
	RESOURCE
	{
		name = ElectricCharge
		rate = 0.1
	}
}
MODULE
{
	name = ModuleSAS
	SASServiceLevel = 3
}
MODULE
{
	name = ModuleDataTransmitter
	antennaType = INTERNAL
	packetInterval = 1.0
	packetSize = 2.0
	packetResourceCost = 0.005
	requiredResource = ElectricCharge
	antennaPower = 500000
	antennaCombinable = false
}

// --- Electric parameters ---
RESOURCE
{
	name = ElectricCharge
	amount = 195
	maxAmount = 195
}

RESOURCE
{
	name = MonoPropellant
	amount = 160
	maxAmount = 160
}

MODULE
{
	name = ModuleDeployableSolarPanel
	sunTracking = false
	raycastTransformName = suncatcher
	pivotName = suncatcher
	isBreakable = false
	resourceName = ElectricCharge
	chargeRate = 3.6
	panelType = CYLINDRICAL
	showInfo = True
	resMultForGetInfo = 2
	powerCurve
	{
		key = 206000000000 0 0 0
		key = 13599840256 1 0 0
		key = 68773560320 0.5 0 0
		key = 0 10 0 0
	}
}

MODULE
{
	name = ModuleDeployableSolarPanel
	sunTracking = false
	raycastTransformName = suncatcher2
	pivotName = suncatcher2
	isBreakable = false
	resourceName = ElectricCharge
	chargeRate = 3.6
	panelType = CYLINDRICAL
	showInfo = True
	resMultForGetInfo = 2
	powerCurve
	{
		key = 206000000000 0 0 0
		key = 13599840256 1 0 0
		key = 68773560320 0.5 0 0
		key = 0 10 0 0
	}
}

MODULE
{
    name = ModuleDecouple
    ejectionForce = 50
	explosiveNodeID = bottom
}

//Reflection shader plugin ONLY USE FOR PIONEER 5
    MODULE
    {
        name = ReflectiveShaderModule

        // Lower values for performance, higher values for aesthetics (you shouldn't ever need to go higher than 1024).
        CubeMapSize = 16

        // How deep the reflection will be ("how far the reflection camera will view")
        FarClipPlane = 500000000
		// How far away must something be before it is reflected
		NearClipPlane = .1

        // Set to false to render all 6 faces of the CubeMap at once (six times slower~)
        OneFacePerFrame = true

        // The shader to find. The reflective shaders are:
        // Reflective/Diffuse
        // Reflective/VertexLit
        // Reflective/Bumped Diffuse
		//Reflective/Bumped Specular
        ShaderName = Reflective/Bumped Diffuse
		realTimeReflection = False
		

        // The height of the parallax map. Values are accepted between 0.005 and 0.08.
        ParallaxHeight = 0.01

        // How reflective the reflection will be (Weakest 0.0 - 1.0 Strongest).
        ReflectionStrength = 0.10
		//ReflectionColor = 0, 0, 0, 0

        // Use this variable to specify which meshes to apply the shader to.
        // Not using this variable will default to the first found mesh.
        // Use the actual mesh name for the value. Or you could use:
        // all - to replace the shader on all meshes in the model.
        MeshesToChange = sp

        // How shiny the specularity will be (if specular).
        // This value will be automatically set if it already exists on the previous shader and is not defined here.
        Shininess = 1.0
		updateRate = 130

        // These variables should be used together only.
        // These values will be automatically set if they already exist on the previous shader and are not defined here
        //SpecColorR = 0.8
        //SpecColorG = 0.8
        //SpecColorB = 0.8
        //SpecColorA = 0.8
		//rimFalloff = 5.0
		//rimColor = 0.8242, 0.6445, 0.1914, 1.0
		//ReflectionColor = 0.6242, 0.6445, 0.69, 1.0
    }

}
