PART
{

// --- general parameters ---
name = rn_atlasi_fs
module = Part
author = Raidernick

// --- asset parameters ---
MODEL
	{
	  model = RN_US_Rockets/AtlasII/atlasi_fs
          scale = 0.80, 0.80, 0.80
	}

scale = 0.80
rescaleFactor = 1

// --- node definitions ---
node_stack_top = 0.0, 8.30045, 0.0, 0.0, 1.0, 0.0, 2
node_stack_bottom = 0.0, -9.22892, 0.0, 0.0, -1.0, 0.0, 2
node_stack_engine = 0.0, -11.2442, 0.0, 0.0, -1.0, 0.0, 1
node_stack_vern1 = 0.0, -9.05841, 1.48933, 0.0, -1.0, 0.0, 1
node_stack_vern2 = 0.0, -9.05841, -1.48933, 0.0, -1.0, 0.0, 1

bulkheadProfiles = size1, srf

// --- editor parameters ---
TechRequired = advRocketry
entryCost = 5450
cost = 8800
category = Propulsion
subcategory = 0
title = Atlas G/I First Stage Fuel Tank
manufacturer = RN Industries
description = First stage fuel tank for the Atlas G/I rockets.
tags = atlas atlasg atlasi d1ar d1b

// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
attachRules = 1,0,1,1,0
stackSymmetry = 1

// --- standard part parameters ---
mass = 5.51
dragModelType = default
maximum_drag = 0.2
minimum_drag = 0.3
angularDrag = 2
crashTolerance = 18
breakingForce = 120
breakingTorque = 120
explosionPotential = 0.75
maxTemp = 2600
bulkheadProfiles = size2

RESOURCE
{
 name = LiquidFuel
 amount = 5760
 maxAmount = 5760
}

RESOURCE
{
 name = Oxidizer
 amount = 7040
 maxAmount = 7040
}

//Reflection shader plugin
    MODULE
    {
        name = ReflectiveShaderModule

        // Lower values for performance, higher values for aesthetics (you shouldn't ever need to go higher than 1024).
        CubeMapSize = 16

        // How deep the reflection will be ("how far the reflection camera will view")
        FarClipPlane = 500000000
		// How far away must something be before it is reflected
		NearClipPlane = .1

        // Set to false to render all 6 faces of the CubeMap at once (six times slower~)
        OneFacePerFrame = true

        // The shader to find. The reflective shaders are:
        // Reflective/Diffuse
        // Reflective/VertexLit
        // Reflective/Bumped Diffuse
		//Reflective/Bumped Specular
        ShaderName = Reflective/Bumped Diffuse
		realTimeReflection = False
		

        // The height of the parallax map. Values are accepted between 0.005 and 0.08.
        ParallaxHeight = 0.01

        // How reflective the reflection will be (Weakest 0.0 - 1.0 Strongest).
        ReflectionStrength = 0.25
		//ReflectionColor = 0, 0, 0, 0

        // Use this variable to specify which meshes to apply the shader to.
        // Not using this variable will default to the first found mesh.
        // Use the actual mesh name for the value. Or you could use:
        // all - to replace the shader on all meshes in the model.
        MeshesToChange = atlasi_fs,fs_side_mp,fs_side_mp_mount,tank_bottom,fs_bot_bars,fs_b_sp,fs_side_sp_mount,fs_bigpipe,fs_f_sp,fs_side_sp_mount2,fs_top

        // How shiny the specularity will be (if specular).
        // This value will be automatically set if it already exists on the previous shader and is not defined here.
        Shininess = 1.0
		updateRate = 160

        // These variables should be used together only.
        // These values will be automatically set if they already exist on the previous shader and are not defined here
        SpecColorR = 0.8
        SpecColorG = 0.8
        SpecColorB = 0.8
        SpecColorA = 0.8
		rimFalloff = 5.0
		rimColor = 0.6242, 0.6445, 0.6914, 1.0
		ReflectionColor = 0.6442, 0.6445, 0.64, 1.0
    }


}